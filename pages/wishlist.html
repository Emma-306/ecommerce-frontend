<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header class="lg:fixed top-0 left-0 w-full z-50">
      <div
        class="flex flex-row h-16 md:h-12 bg-black text-white w-full items-center justify-center lg:justify-end lg:pr-48 font-normal text-sm p-4 relative"
      >
        <div class="flex flex-row">
          <span
            >Summer Sale For All Swim Suits And Free Express Delivery - OFF
            50%!</span
          >
          <a href="#" class="ml-2 font-semibold underline">ShopNow</a>
        </div>
        <select
          name="language"
          id="language"
          class="bg-black text-white ml-4 md:ml-20 top-1 md:top-3 outline-none lg:ml-56"
        >
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
        </select>
      </div>
      <div
        class="transition-all duration-300 flex flex-col lg:flex-row h-32 lg:h-16 items-center lg:items-end w-full bg-white py-4 lg:px-32 justify-center md:justify-center border-b-2 border-gray-300 shadow-md lg:gap-24 relative"
        id="nav-container-landing"
      >
        <span class="font-bold text-2xl mb-3 lg:mb-0 xl:mr-52">Exclusive</span>
        <button class="absolute left-2 top-5 lg:hidden" id="nav-bar-landing">
          <i class="fa-solid fa-bars" style="color: rgb(11, 11, 11)"></i>
        </button>

        <nav
          class="hidden flex-col w-full lg:flex lg:flex-row gap-8 lg:gap-12 font-normal text-base mt-4 mb-9 lg:mt-0 lg:mb-0 px-4 lg:px-0"
          id="nav-landing"
        >
          <a href="landingPage.html" class="whitespace-nowrap">Home</a>
          <a href="#" class="whitespace-nowrap">Contact</a>
          <a href="#" class="whitespace-nowrap">About</a>
          <a href="signUpPage.html" class="whitespace-nowrap">Sign Up</a>
        </nav>
        <div
          class="w-full lg:w-96 flex flex-row gap-6 items-center justify-center"
        >
          <div class="relative w-60">
            <input
              type="text"
              placeholder="What are you looking for?"
              class="bg-gray-200 pl-4 pr-8 py-3 h-8 w-full lg:w-60 placeholder:text-sm rounded-lg"
            />
            <i
              class="fa-solid fa-magnifying-glass"
              style="
                color: rgb(11, 11, 11);
                position: absolute;
                right: 1rem;
                top: 50%;
                transform: translateY(-50%);
              "
            ></i>
          </div>
          <i class="fa-regular fa-heart" style="color: rgb(11, 11, 11)"></i>
          <i
            class="fa-solid fa-cart-arrow-down"
            style="color: rgb(11, 11, 11)"
          ></i>
          <i
            class="fa-solid fa-user rounded-full bg-theme p-2"
            style="color: rgb(255, 255, 255)"
          ></i>
        </div>
      </div>
    </header>
  </body>
</html>
